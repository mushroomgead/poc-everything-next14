name: Build and Deploy

on:
    push:
        branches:
            -   main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: 20
                    cache: npm

            -   name: Install dependencies
                run: npm ci

            -   name: Install tests
                run: npm run test

            -   name: Build
                run: npm run build

            -   name: Login to GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GHCR_TOKEN }}
            
            -   name: Build and Push Docker image
                uses: docker/build-push-action@v5
                with:
                    context: .
                    push: true
                    tags: ghcr.io/${{ github.repository_owner }}/poc-everything-next14:latest
            
            -   name: Install cloudflared
                run: |
                    curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
                    chmod +x cloudflared
                    sudo mv cloudflared /usr/local/bin/

            -   name: Deploy to server via SSH
                env:
                    SSH_KEY: ${{ secrets.SERVER_KEY }}
                run: |
                    mkdir -p ~/.ssh
                    echo "$SSH_KEY" > ~/.ssh/id_rsa
                    chmod 600 ~/.ssh/id_rsa
                    ssh -o StrictHostKeyChecking=no \
                        -o ProxyCommand="cloudflared access ssh --hostname ssh.catterydoubleg.com" \
                        -p 2222 \
                        ${{ secrets.SERVER_USER }}@ssh.catterydoubleg.com \
                        "cd /home/next14 && docker compose pull && docker compose up -d"

                            


            
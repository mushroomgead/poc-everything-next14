name: Build and Deploy

on:
    push:
        branches:
            -   main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: 20
                    cache: npm

            -   name: Install dependencies
                run: npm ci

            -   name: Install tests
                run: npm run test

            -   name: Build
                run: npm run build

            -   name: Login to GHCR
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GHCR_TOKEN }}
            
            -   name: Build and Push Docker image
                uses: docker/build-push-action@v5
                with:
                    context: .
                    push: true
                    tags: ghcr.io/${{ github.repository_owner }}/poc-everything-next14:latest
            
            -   name: Install cloudflared
                run: |
                    curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
                    chmod +x cloudflared
                    sudo mv cloudflared /usr/local/bin/

            -   name: Deploy to server via SSH
                uses: appleboy/ssh-action@v1
                with:
                    host: ${{ secrets.SERVER_HOST }}
                    username: ${{ secrets.SERVER_USER }}
                    key: ${{ secrets.SERVER_KEY }}
                    proxy_command: cloudflared access ssh --hostname ${{ secrets.SERVER_HOST }}
                    port: 2222
                    script: |
                        docker compose -f /home/next14/docker-compose.yml pull
                        docker compose -f /home/next14/docker-compose.yml up -d

            


            